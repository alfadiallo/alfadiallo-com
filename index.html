<script>
/* Theme toggle. Dark is the default; light only when the visitor opts in.
   Kept inline so every page works with zero extra requests. */
(function () {
  var root = document.documentElement;
  try { var s = localStorage.getItem('theme'); if (s) root.setAttribute('data-theme', s); } catch (e) {}
  function current() { return root.getAttribute('data-theme') || 'dark'; }
  function paint() {
    var dark = current() === 'dark';
    var sun = document.querySelector('.theme-toggle .sun');
    var moon = document.querySelector('.theme-toggle .moon');
    if (sun && moon) { sun.style.display = dark ? 'none' : 'block'; moon.style.display = dark ? 'block' : 'none'; }
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', dark ? '#101216' : '#f6f4ef');
  }
  paint();
  var btn = document.getElementById('themeToggle');
  if (btn) btn.addEventListener('click', function () {
    var next = current() === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
    paint();
  });
})();
</script>
